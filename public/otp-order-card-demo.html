<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Order Card Demo</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #eef8f2;
            --surface: rgba(255, 255, 255, 0.94);
            --surface-soft: #f6fbf8;
            --line: #d7eadf;
            --text: #123126;
            --muted: #62806f;
            --green: #1faa67;
            --green-dark: #168551;
            --green-soft: #e7f8ef;
            --yellow: #f6cf57;
            --yellow-dark: #e2b93f;
            --shadow: 0 18px 40px rgba(27, 103, 64, 0.12);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top, rgba(96, 196, 138, 0.22), transparent 36%),
                linear-gradient(180deg, #f7fcf8 0%, #edf7f1 100%);
            color: var(--text);
        }

        .demo-shell {
            width: min(100%, 440px);
        }

        .order-card {
            border-radius: var(--radius);
            border: 1px solid rgba(31, 170, 103, 0.12);
            background: var(--surface);
            box-shadow: var(--shadow);
            padding: 18px;
            backdrop-filter: blur(12px);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 44px rgba(27, 103, 64, 0.16);
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .service-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--green-soft);
            color: var(--green-dark);
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }

        .number-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            flex: 1 1 240px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .flag-image {
            width: 28px;
            height: 20px;
            border-radius: 4px;
            object-fit: cover;
            box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.06);
            flex: 0 0 auto;
        }

        .phone-number {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            color: #16382b;
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .copy-btn,
        .action-btn {
            border: 0;
            cursor: pointer;
            transition: transform 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
            font-family: inherit;
        }

        .copy-btn {
            padding: 8px 12px;
            border-radius: 999px;
            background: #f1f6f3;
            color: #24513d;
            font-size: 0.82rem;
            font-weight: 700;
            box-shadow: inset 0 0 0 1px rgba(31, 170, 103, 0.12);
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: #e4f4ea;
            transform: translateY(-1px);
        }

        .copy-btn:active,
        .action-btn:active {
            transform: translateY(0);
        }

        .status-row {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            color: var(--green-dark);
            font-size: 0.88rem;
            font-weight: 600;
        }

        .spinner,
        .mini-spinner {
            display: inline-block;
            border-radius: 999px;
            border-style: solid;
            border-color: rgba(31, 170, 103, 0.18);
            border-top-color: var(--green);
            animation: spin 0.8s linear infinite;
            flex: 0 0 auto;
        }

        .mini-spinner {
            width: 14px;
            height: 14px;
            border-width: 2px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border-width: 3px;
        }

        .meta-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
            padding: 10px 12px;
            border-radius: 10px;
            background: var(--surface-soft);
            color: var(--muted);
            font-size: 0.84rem;
            line-height: 1.4;
        }

        .meta-row strong {
            color: var(--text);
            font-weight: 700;
        }

        .meta-divider {
            width: 4px;
            height: 4px;
            border-radius: 999px;
            background: rgba(31, 170, 103, 0.3);
        }

        .otp-box {
            margin-top: 14px;
            padding: 16px;
            border-radius: 12px;
            border: 1px dashed rgba(31, 170, 103, 0.24);
            background: linear-gradient(180deg, rgba(231, 248, 239, 0.94), rgba(247, 252, 248, 0.92));
            min-height: 84px;
            display: grid;
            place-items: center;
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }

        .otp-loading,
        .otp-code {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: center;
            width: 100%;
        }

        .otp-loading span:last-child {
            color: var(--muted);
            font-size: 0.94rem;
            font-weight: 600;
        }

        .otp-code {
            display: none;
            flex-direction: column;
            gap: 6px;
        }

        .otp-box.is-ready {
            border-color: rgba(31, 170, 103, 0.4);
            background: linear-gradient(180deg, rgba(223, 247, 232, 0.98), rgba(236, 252, 242, 0.98));
        }

        .otp-label {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .otp-value {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 132px;
            padding: 10px 16px;
            border-radius: 12px;
            background: rgba(31, 170, 103, 0.16);
            color: var(--green-dark);
            font-size: clamp(1.35rem, 4vw, 1.75rem);
            font-weight: 800;
            letter-spacing: 0.18em;
            box-shadow: inset 0 0 0 1px rgba(31, 170, 103, 0.18);
        }

        .actions {
            margin-top: 16px;
        }

        .action-btn {
            width: 100%;
            min-height: 46px;
            border-radius: 12px;
            font-size: 0.96rem;
            font-weight: 800;
            letter-spacing: 0.01em;
            box-shadow: 0 10px 24px rgba(25, 116, 70, 0.14);
        }

        .action-btn:hover {
            transform: translateY(-1px);
        }

        .action-btn.cancel {
            background: linear-gradient(180deg, #21b36d 0%, #159a5b 100%);
            color: #ffffff;
        }

        .action-btn.cancel:hover {
            background: linear-gradient(180deg, #27bf75 0%, #189d5f 100%);
        }

        .action-btn.complete {
            background: linear-gradient(180deg, #f8d86d 0%, #f2c84b 100%);
            color: #111111;
        }

        .action-btn.complete:hover {
            background: linear-gradient(180deg, #ffe07f 0%, #f6cb51 100%);
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 20px;
            transform: translate(-50%, 20px);
            opacity: 0;
            pointer-events: none;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(18, 49, 38, 0.94);
            color: #ffffff;
            font-size: 0.84rem;
            font-weight: 700;
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.16);
            transition: opacity 0.22s ease, transform 0.22s ease;
            z-index: 20;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 14px;
            }

            .order-card {
                padding: 14px;
            }

            .card-top {
                align-items: flex-start;
            }

            .number-wrap {
                justify-content: flex-start;
            }

            .meta-row {
                gap: 8px;
            }

            .meta-divider {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="demo-shell">
        <article class="order-card" id="order-card">
            <div class="card-top">
                <div class="service-badge" id="service-name"></div>
                <div class="number-wrap">
                    <img class="flag-image" id="flag-image" alt="Country flag">
                    <div class="phone-number" id="phone-number"></div>
                    <button class="copy-btn" id="copy-btn" type="button">Copy</button>
                </div>
            </div>
            <div class="status-row" id="status-row">
                <span class="mini-spinner"></span>
                <span id="status-text">Waiting for SMS</span>
            </div>
            <div class="meta-row">
                <span>Price: <strong id="price-value"></strong></span>
                <span class="meta-divider"></span>
                <span>Time: <strong id="time-value"></strong></span>
                <span class="meta-divider"></span>
                <span>Status: <strong id="status-value">Waiting</strong></span>
            </div>
            <div class="otp-box" id="otp-box">
                <div class="otp-loading" id="otp-loading">
                    <span class="spinner"></span>
                    <span>Code will be here</span>
                </div>
                <div class="otp-code" id="otp-code-wrap">
                    <div class="otp-label">OTP Received</div>
                    <div class="otp-value" id="otp-value"></div>
                </div>
            </div>
            <div class="actions" id="actions"></div>
        </article>
    </div>

    <div class="toast" id="toast">Copied!</div>

    <script>
        const serviceName = 'WhatsApp';
        const number = '+6285726783602';
        const countryCode = 'id';
        const flagURL = 'https://flagcdn.com/w40/id.png';
        const price = 170;
        const time = '21:06';
        const demoOtp = '834920';
        const otpDelay = 10000;

        const els = {
            serviceName: document.getElementById('service-name'),
            phoneNumber: document.getElementById('phone-number'),
            flagImage: document.getElementById('flag-image'),
            priceValue: document.getElementById('price-value'),
            timeValue: document.getElementById('time-value'),
            statusText: document.getElementById('status-text'),
            statusValue: document.getElementById('status-value'),
            otpBox: document.getElementById('otp-box'),
            otpLoading: document.getElementById('otp-loading'),
            otpCodeWrap: document.getElementById('otp-code-wrap'),
            otpValue: document.getElementById('otp-value'),
            actions: document.getElementById('actions'),
            copyBtn: document.getElementById('copy-btn'),
            toast: document.getElementById('toast')
        };

        const orderState = {
            otpReceived: false,
            completed: false
        };

        function renderCard() {
            els.serviceName.textContent = serviceName;
            els.phoneNumber.textContent = number;
            els.flagImage.src = flagURL || `https://flagcdn.com/w40/${countryCode}.png`;
            els.flagImage.alt = `${countryCode.toUpperCase()} flag`;
            els.priceValue.textContent = `${price} PKR`;
            els.timeValue.textContent = time;
            renderOtpState();
            renderActionButton();
        }

        function renderOtpState() {
            if (orderState.completed) {
                els.statusText.textContent = 'Order completed';
                els.statusValue.textContent = 'Completed';
                els.otpBox.classList.add('is-ready');
                els.otpLoading.style.display = 'none';
                els.otpCodeWrap.style.display = 'flex';
                els.otpValue.textContent = demoOtp;
                return;
            }

            if (orderState.otpReceived) {
                els.statusText.textContent = 'OTP received';
                els.statusValue.textContent = 'Received';
                els.otpBox.classList.add('is-ready');
                els.otpLoading.style.display = 'none';
                els.otpCodeWrap.style.display = 'flex';
                els.otpValue.textContent = demoOtp;
                return;
            }

            els.statusText.textContent = 'Waiting for SMS';
            els.statusValue.textContent = 'Waiting';
            els.otpBox.classList.remove('is-ready');
            els.otpLoading.style.display = 'flex';
            els.otpCodeWrap.style.display = 'none';
            els.otpValue.textContent = '';
        }

        function renderActionButton() {
            if (orderState.completed) {
                els.actions.innerHTML = '<button class="action-btn cancel" type="button" disabled style="opacity:.65;cursor:default">Completed</button>';
                return;
            }

            if (orderState.otpReceived) {
                els.actions.innerHTML = '<button class="action-btn complete" id="complete-btn" type="button">Complete</button>';
                document.getElementById('complete-btn').addEventListener('click', completeOrder);
                return;
            }

            els.actions.innerHTML = '<button class="action-btn cancel" id="cancel-btn" type="button">Cancel</button>';
            document.getElementById('cancel-btn').addEventListener('click', () => showToast('Order cancelled'));
        }

        async function copyNumber() {
            try {
                await navigator.clipboard.writeText(number);
                showToast('Copied!');
            } catch {
                const input = document.createElement('input');
                input.value = number;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('Copied!');
            }
        }

        function showToast(message) {
            els.toast.textContent = message;
            els.toast.classList.add('show');
            window.clearTimeout(showToast.timeoutId);
            showToast.timeoutId = window.setTimeout(() => {
                els.toast.classList.remove('show');
            }, 1600);
        }

        function completeOrder() {
            orderState.completed = true;
            renderOtpState();
            renderActionButton();
            showToast('Order completed');
        }

        function simulateOtp() {
            window.setTimeout(() => {
                orderState.otpReceived = true;
                renderOtpState();
                renderActionButton();
            }, otpDelay);
        }

        els.copyBtn.addEventListener('click', copyNumber);

        renderCard();
        simulateOtp();
    </script>
</body>
</html>
